# Service definitions for hvac_control integration

process_room_damper:
  fields:
    room_name:
      required: true
      selector:
        text:

process_room_temperature:
  fields:
    room_name:
      required: true
      selector:
        text:

process_all_rooms: {}

process_all_dampers: {}

sync_helper_to_climate:
  fields:
    target_temp_entity:
      required: true
      selector:
        entity:
          domain: input_number
    climate_entity:
      required: true
      selector:
        entity:
          domain: climate
    room_name:
      required: false
      selector:
        text:

sync_climate_to_helper:
  fields:
    climate_entity:
      required: true
      selector:
        entity:
          domain: climate
    target_helper:
      required: true
      selector:
        entity:
          domain: input_number

diagnose_kitchen: {}

set_all_rooms_target_temperature:
  fields:
    temperature:
      required: true
      selector:
        number:
          min: 5
          max: 40
          step: 0.5

handle_boost:
  fields:
    room:
      required: true
      selector:
        text:

set_config:
  fields:
    room_list:
      required: false
      selector:
        text:
    spill_zones:
      required: false
      selector:
        text:
    temp_dead_band:
      required: false
      selector:
        number:
          min: 0.1
          max: 2
          step: 0.1
    sync_tolerance:
      required: false
      selector:
        number:
          min: 0.05
          max: 1
          step: 0.05
